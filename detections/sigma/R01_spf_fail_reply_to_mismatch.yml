title: SPF fail with From / Reply-To domain mismatch
id: 5b3a1d40-6c0a-4f31-8d8a-2c2b9f1c0a01
status: experimental
description: >
  Inbound email failed SPF AND the 5322.From and Reply-To addr-spec domains
  do not match. Common phishing pattern where the attacker spoofs the
  display brand but routes replies to attacker-controlled infrastructure.
references:
  - https://www.rfc-editor.org/rfc/rfc7208
  - https://attack.mitre.org/techniques/T1566/
author: trac3r00 (phish-triage)
date: 2026-06-16
logsource:
  product: email
  category: email-gateway
detection:
  spf_fail:
    authentication_results|contains: 'spf=fail'
  mismatch:
    from_domain|expand: '%from_domain%'
  condition: spf_fail and mismatch
falsepositives:
  - Legitimate forwarders (mailing lists) that rewrite Reply-To.
  - Internal apps sending mail via a different transactional provider.
level: medium
tags:
  - attack.initial_access
  - attack.t1566.001
  - attack.t1566.002
