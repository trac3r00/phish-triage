title: Inbound attachment hash matched VirusTotal malicious verdict
id: 5b3a1d40-6c0a-4f31-8d8a-2c2b9f1c0a05
status: stable
description: >
  An attachment delivered to a user produced a SHA-256 that VirusTotal
  flagged as malicious by at least one engine. High-fidelity indicator
  of a phishing payload.
references:
  - https://attack.mitre.org/techniques/T1566/001/
author: trac3r00 (phish-triage)
date: 2026-06-16
logsource:
  product: email
  category: email-gateway
detection:
  has_attachment:
    attachment_sha256|expand: '%any%'
  vt_hit:
    vt_malicious|gte: 1
  condition: has_attachment and vt_hit
falsepositives:
  - VT false positives on niche tools (verify family + engine).
  - Cracked-software detections in penetration-testing kits sent to red team.
level: high
tags:
  - attack.initial_access
  - attack.t1566.001
