title: Brand or executive display-name impersonation
id: 5b3a1d40-6c0a-4f31-8d8a-2c2b9f1c0a03
status: experimental
description: >
  The 5322.From display name contains a high-value brand keyword
  (PayPal, Microsoft, IRS, CEO, etc.) but the addr-spec domain is NOT
  owned by that brand. Classic phishing / BEC pretext.
references:
  - https://attack.mitre.org/techniques/T1656/
  - https://attack.mitre.org/techniques/T1566/001/
author: trac3r00 (phish-triage)
date: 2026-06-16
logsource:
  product: email
  category: email-gateway
detection:
  brand_name:
    from_display|contains:
      - paypal
      - microsoft
      - apple
      - google
      - amazon
      - irs
      - chase
      - 'wells fargo'
      - dhl
      - fedex
  mismatched_domain:
    from_domain|expand: '%brand_domain%'
  condition: brand_name and not mismatched_domain
falsepositives:
  - Partners with "brand" wording in vendor name (allowlist by domain).
  - Newsletter platforms relaying brand emails (verify SPF alignment).
level: high
tags:
  - attack.initial_access
  - attack.t1566.001
  - attack.t1566.002
  - attack.t1656
