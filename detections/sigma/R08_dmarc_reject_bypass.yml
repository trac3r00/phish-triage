title: DMARC reject / quarantine policy bypass attempt
id: 5b3a1d40-6c0a-4f31-8d8a-2c2b9f1c0a08
status: experimental
description: >
  Inbound email failed DMARC for a domain whose published policy is
  reject (or quarantine) yet the message was delivered to the user
  mailbox anyway. Indicates gateway override, mis-aligned policy
  enforcement, or attacker exploitation of a relay path.
references:
  - https://www.rfc-editor.org/rfc/rfc7489
  - https://attack.mitre.org/techniques/T1566/
author: trac3r00 (phish-triage)
date: 2026-06-16
logsource:
  product: email
  category: email-gateway
detection:
  dmarc_fail:
    authentication_results|contains: 'dmarc=fail'
  strict_policy:
    dmarc_policy:
      - reject
      - quarantine
  delivered:
    final_disposition: delivered
  condition: dmarc_fail and strict_policy and delivered
falsepositives:
  - Allowlist or sender-override rules that intentionally bypass DMARC
    (audit the allowlist regularly).
level: high
tags:
  - attack.initial_access
  - attack.t1566
  - attack.defense_evasion
