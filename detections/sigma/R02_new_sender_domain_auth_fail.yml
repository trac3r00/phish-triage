title: Newly observed sender domain with authentication failure
id: 5b3a1d40-6c0a-4f31-8d8a-2c2b9f1c0a02
status: experimental
description: >
  An inbound email arrived from a sender domain not observed in the
  organisation over the past 30 days, AND authentication
  (SPF, DKIM, or DMARC) failed. New infrastructure + auth failure is a
  reliable phishing precursor.
references:
  - https://attack.mitre.org/techniques/T1566/
author: trac3r00 (phish-triage)
date: 2026-06-16
logsource:
  product: email
  category: email-gateway
detection:
  auth_failed:
    authentication_results|contains:
      - 'spf=fail'
      - 'dkim=fail'
      - 'dmarc=fail'
  novel_sender:
    sender_domain_first_seen_days: 0
  condition: auth_failed and novel_sender
falsepositives:
  - First-time legitimate vendor outreach (verify out of band).
  - Internal domain alignment changes after SPF/DKIM rotation.
level: high
tags:
  - attack.initial_access
  - attack.t1566
