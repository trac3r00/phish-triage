title: Inbound link to a known high-risk TLD
id: 5b3a1d40-6c0a-4f31-8d8a-2c2b9f1c0a06
status: experimental
description: >
  An inbound email links to a domain registered under a TLD that is
  disproportionately abused for phishing (.zip, .mov, .top, .country,
  .xyz, .click, .support, .quest, .lol). Pair with display-name
  impersonation or auth fail for high confidence.
references:
  - https://attack.mitre.org/techniques/T1566/002/
  - https://attack.mitre.org/techniques/T1583/001/
author: trac3r00 (phish-triage)
date: 2026-06-16
logsource:
  product: email
  category: email-gateway
detection:
  sus_tld:
    url_tld:
      - .zip
      - .mov
      - .top
      - .country
      - .xyz
      - .click
      - .support
      - .quest
      - .lol
  condition: sus_tld
falsepositives:
  - Legitimate sites on .xyz / .click (allowlist by full FQDN).
level: medium
tags:
  - attack.initial_access
  - attack.t1566.002
  - attack.resource_development
  - attack.t1583.001
